# Starter Home Assistant package for staged shop ventilation.
# Entity IDs are placeholders. Replace them with local entities before use.

input_boolean:
  shop_ventilation_manual_disable:
    name: Shop ventilation manual disable
  shop_ventilation_force_purge:
    name: Shop ventilation force purge

input_number:
  shop_purge_outdoor_margin:
    name: Shop purge outdoor margin
    min: 1
    max: 20
    step: 0.5
    unit_of_measurement: "°F"
    initial: 5
  shop_purge_stratification_margin:
    name: Shop purge stratification margin
    min: 1
    max: 30
    step: 0.5
    unit_of_measurement: "°F"
    initial: 5
  shop_purge_comfort_threshold:
    name: Shop purge comfort threshold
    min: 50
    max: 100
    step: 1
    unit_of_measurement: "°F"
    initial: 78
  shop_purge_upper_heat_threshold:
    name: Shop purge upper heat threshold
    min: 60
    max: 130
    step: 1
    unit_of_measurement: "°F"
    initial: 85
  shop_damper_open_delay_seconds:
    name: Shop damper open delay
    min: 5
    max: 120
    step: 1
    unit_of_measurement: s
    initial: 20
  shop_blower_stop_delay_seconds:
    name: Shop blower stop delay
    min: 5
    max: 120
    step: 1
    unit_of_measurement: s
    initial: 20
  shop_minimum_runtime_minutes:
    name: Shop minimum ventilation runtime
    min: 5
    max: 180
    step: 5
    unit_of_measurement: min
    initial: 20
  shop_cooldown_minutes:
    name: Shop ventilation cooldown
    min: 5
    max: 180
    step: 5
    unit_of_measurement: min
    initial: 30
  shop_maximum_runtime_minutes:
    name: Shop maximum ventilation runtime
    min: 15
    max: 480
    step: 5
    unit_of_measurement: min
    initial: 180

template:
  - binary_sensor:
      - name: Shop purge available
        unique_id: shop_purge_available
        state: >-
          {% set outdoor = states('sensor.shop_outdoor_temperature') | float(none) %}
          {% set occupied = states('sensor.shop_occupied_zone_temperature') | float(none) %}
          {% set upper = states('sensor.shop_upper_zone_temperature') | float(none) %}
          {% set outdoor_margin = states('input_number.shop_purge_outdoor_margin') | float(5) %}
          {% set strat_margin = states('input_number.shop_purge_stratification_margin') | float(5) %}
          {% set comfort = states('input_number.shop_purge_comfort_threshold') | float(78) %}
          {% set upper_hot = states('input_number.shop_purge_upper_heat_threshold') | float(85) %}
          {% set disabled = is_state('input_boolean.shop_ventilation_manual_disable', 'on') %}
          {% if outdoor is none or occupied is none or upper is none or disabled %}
            false
          {% else %}
            {{ (outdoor + outdoor_margin < occupied)
               and (upper > occupied + strat_margin)
               and ((occupied > comfort) or (upper > upper_hot)) }}
          {% endif %}
        attributes:
          note: "Replace placeholder sensor IDs before use."

script:
  shop_ventilation_start:
    alias: Shop ventilation start sequence
    mode: single
    sequence:
      - condition: state
        entity_id: binary_sensor.shop_purge_available
        state: "on"
      - service: switch.turn_on
        target:
          entity_id: switch.shop_damper
      - delay:
          seconds: "{{ states('input_number.shop_damper_open_delay_seconds') | int(20) }}"
      - service: switch.turn_on
        target:
          entity_id: switch.shop_blower

  shop_ventilation_stop:
    alias: Shop ventilation stop sequence
    mode: single
    sequence:
      - service: switch.turn_off
        target:
          entity_id: switch.shop_blower
      - delay:
          seconds: "{{ states('input_number.shop_blower_stop_delay_seconds') | int(20) }}"
      - service: switch.turn_off
        target:
          entity_id: switch.shop_damper

automation:
  - alias: Shop ventilation start when purge available
    id: shop_ventilation_start_when_purge_available
    mode: single
    trigger:
      - platform: state
        entity_id: binary_sensor.shop_purge_available
        to: "on"
        for: "00:05:00"
      - platform: state
        entity_id: input_boolean.shop_ventilation_force_purge
        to: "on"
    condition:
      - condition: state
        entity_id: input_boolean.shop_ventilation_manual_disable
        state: "off"
    action:
      - service: script.shop_ventilation_start

  - alias: Shop ventilation stop when purge unavailable
    id: shop_ventilation_stop_when_purge_unavailable
    mode: single
    trigger:
      - platform: state
        entity_id: binary_sensor.shop_purge_available
        to: "off"
        for: "00:10:00"
      - platform: state
        entity_id: input_boolean.shop_ventilation_manual_disable
        to: "on"
    action:
      - service: script.shop_ventilation_stop
      - service: input_boolean.turn_off
        target:
          entity_id: input_boolean.shop_ventilation_force_purge
