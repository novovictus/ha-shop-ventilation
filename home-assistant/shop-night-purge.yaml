# Shop Night Heat Extraction v1
#
# Current field-cycle ground truth.
# Export shape: two Home Assistant UI automations stored together for repo tracking.
# Paste each automation separately into the Home Assistant automation YAML editor.
#
# Purpose:
# - Use the damper/fan as a nighttime floor/slab heat-extraction safeguard.
# - Do nothing when the shop passively equalizes without help.
# - Avoid daytime purge, AC conflict, bay-door/manual-use conflict, and high-RH extraction.

- alias: Shop Night Heat Extraction - Start
  description: Starts damper/fan overnight when outdoor air is cooler than the floor and humidity is acceptable.
  mode: single

  trigger:
    - platform: sun
      event: sunset
      offset: "00:20:00"

    - platform: time_pattern
      minutes: "/20"

  condition:
    - condition: state
      entity_id: switch.damper_switch
      state: "off"

    - condition: sun
      after: sunset
      after_offset: "00:20:00"
      before: sunrise

    - condition: state
      entity_id: binary_sensor.bay_door_opening
      state: "off"

    - condition: state
      entity_id: switch.ac_heat_switch_switch
      state: "off"

    - condition: template
      value_template: >
        {{ states('sensor.outdoor_thermometer_temperature') | float(999)
           <= states('sensor.floor_thermometer_temperature') | float(0) - 3 }}

    - condition: numeric_state
      entity_id: sensor.outdoor_thermometer_humidity
      below: 85

  action:
    - service: switch.turn_on
      target:
        entity_id: switch.damper_switch

    - service: logbook.log
      data:
        name: Shop Night Heat Extraction
        message: >
          Started. Outdoor temp {{ states('sensor.outdoor_thermometer_temperature') }}°F,
          floor temp {{ states('sensor.floor_thermometer_temperature') }}°F,
          outdoor RH {{ states('sensor.outdoor_thermometer_humidity') }}%.
        entity_id: switch.damper_switch

- alias: Shop Night Heat Extraction - Stop
  description: Stops damper/fan on sunrise, HVAC, bay door open, temp convergence, or high humidity.
  mode: single

  trigger:
    - platform: state
      entity_id: binary_sensor.bay_door_opening
      to: "on"

    - platform: state
      entity_id: switch.ac_heat_switch_switch
      to: "on"

    - platform: sun
      event: sunrise

    - platform: time_pattern
      minutes: "/20"

  condition:
    - condition: state
      entity_id: switch.damper_switch
      state: "on"

    - condition: or
      conditions:
        - condition: state
          entity_id: binary_sensor.bay_door_opening
          state: "on"

        - condition: state
          entity_id: switch.ac_heat_switch_switch
          state: "on"

        - condition: sun
          after: sunrise
          before: sunset

        - condition: template
          value_template: >
            {{ states('sensor.outdoor_thermometer_temperature') | float(999)
               >= states('sensor.floor_thermometer_temperature') | float(0) - 1 }}

        - condition: numeric_state
          entity_id: sensor.outdoor_thermometer_humidity
          above: 84.9

  action:
    - service: switch.turn_off
      target:
        entity_id: switch.damper_switch

    - service: logbook.log
      data:
        name: Shop Night Heat Extraction
        message: >
          Stopped. Outdoor temp {{ states('sensor.outdoor_thermometer_temperature') }}°F,
          floor temp {{ states('sensor.floor_thermometer_temperature') }}°F,
          outdoor RH {{ states('sensor.outdoor_thermometer_humidity') }}%.
        entity_id: switch.damper_switch
